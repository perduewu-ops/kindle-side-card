name: CI

on:
  push:
  pull_request:

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
      - name: Compile Python
        run: python -m compileall daemon examples
      - name: Sensitive string scan
        run: |
          ! grep -RInE '(/Users/|192\.168\.|B024|com\.theta|portfolio-overview|WinterBreak|winterbreak|SUPABASE|OPENAI_API_KEY|ANTHROPIC_API_KEY)' \
            --exclude-dir=.git \
            --exclude=.git \
            --exclude=ci.yml \
            .
